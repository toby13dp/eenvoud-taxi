name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

permissions:
  contents: read

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Configureer npm registry
        run: npm config set registry https://registry.npmjs.org/

      - name: Herstel package-lock registry urls
        run: |
          sed -i 's#https://packages.applied-caas-gateway1.internal.api.openai.org/artifactory/api/npm/npm-public/#https://registry.npmjs.org/#g' package-lock.json

      - name: Installeer dependencies
        run: npm ci --no-audit --no-fund

      - name: Bouw web app
        run: npm run build

      - name: Voeg Android platform toe indien nodig
        run: |
          if [ ! -d android ]; then
            npx cap add android
          fi

      - name: Synchroniseer Capacitor
        run: npx cap sync android

      - name: Bouw debug APK
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: taxi-beheer-app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
